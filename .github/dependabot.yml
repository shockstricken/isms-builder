version: 2

updates:
  # npm – wöchentliche Security- und Versions-Updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    reviewers:
      - "coolstartnow"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Major-Version-Upgrades nur nach manuellem Review
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # pdf-parse: bewusst auf 1.1.1 gepinnt — v2 hat eine inkompatible API
      # (Default-Export ist in v2 eine Klasse statt eine Funktion).
      # Änderung nur nach expliziter Migration in greenobonePdfParser.js.
      # Siehe: server/ai/greenobonePdfParser.js, PINNED-DEPS.md
      - dependency-name: "pdf-parse"
        versions: [">= 1.1.2"]

  # GitHub Actions – Actions selbst aktuell halten
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
